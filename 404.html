<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Black & White Theme */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: monospace; /* Typewriter/terminal feel */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Container Styling */
        .error-container {
            padding: 20px;
        }

        /* Giant 404 Text */
        h1 {
            font-size: 10rem;
            font-weight: normal;
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -5px;
        }

        /* Subheading */
        h2 {
            font-size: 2rem;
            font-weight: normal;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Description */
        p {
            font-size: 1rem;
            color: #b3b3b3; /* Light gray to soften the text */
            margin-bottom: 40px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        /* Minimalist Button */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            font-size: 1rem;
            color: #000000;
            background-color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid #ffffff;
            transition: all 0.3s ease;
        }

        /* Invert colors on hover */
        .btn:hover {
            background-color: #000000;
            color: #ffffff;
        }

        /* Mobile Adjustments */
        @media screen and (max-width: 600px) {
            h1 { font-size: 6rem; }
            h2 { font-size: 1.5rem; }
            p { font-size: 0.9rem; padding: 0 15px; }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you are looking for has been moved, deleted, or does not exist.</p>
        <a href="/" class="btn">Go Back Home</a>
    </div>

</body>
</html>
